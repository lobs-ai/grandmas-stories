name: GrandmasStories
options:
  bundleIdPrefix: com.lobsai
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  GrandmasStories:
    type: application
    platform: iOS
    sources:
      - GrandmasStories
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lobsai.grandmas-stories
        INFOPLIST_FILE: GrandmasStories/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    info:
      path: GrandmasStories/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Grandma's Stories needs your microphone to record your personal stories for your family."
        NSContactsUsageDescription: "Grandma's Stories can use your contacts to easily select family members to share stories with."

  GrandmasStoriesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GrandmasStoriesTests
    dependencies:
      - target: GrandmasStories
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lobsai.grandmas-stories.tests
